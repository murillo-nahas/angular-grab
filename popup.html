<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #010000;
        color: #fff;
        padding: 20px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
      }

      .logo-text {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.2px;
        color: #fff;
      }

      .logo-text span { color: #dd0031; }

      .description {
        font-size: 12px;
        color: #888;
        line-height: 1.55;
        margin-bottom: 16px;
      }

      .description strong {
        color: #ccc;
        font-weight: 500;
      }

      button {
        width: 100%;
        padding: 10px 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
        letter-spacing: 0.1px;
      }

      button.off {
        background: #dd0031;
        color: #fff;
        border: none;
      }

      button.off:hover { background: #c4002b; }

      button.on {
        background: transparent;
        color: #dd0031;
        border: 1.5px solid #dd0031;
      }

      button.on:hover { background: rgba(221, 0, 49, 0.08); }

      .hint {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 11px;
        color: #555;
      }

      .kbd {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 5px;
        padding: 2px 6px;
        font-size: 11px;
        color: #aaa;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <img src="assets/logo.svg" class="logo-icon" alt="AngularGrab" />
      <div class="logo-text">Angular<span>Grab</span></div>
    </div>

    <p class="description">
      <strong>AngularGrab</strong> lets you select context for coding agents directly from your website.
    </p>

    <button id="toggleBtn" class="off">Enable Picker</button>

    <div class="hint">
      Press <span class="kbd">Esc</span> to exit
    </div>

    <script src="popup.js"></script>
  </body>
</html>
